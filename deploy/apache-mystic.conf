# HTTP vhost for mystic.nthmost.net — reverse proxy to the gunicorn service.
# certbot --apache will clone this into a *-le-ssl.conf and add the redirect;
# on the SSL vhost, set X-Forwarded-Proto to "https" (ProxyFix reads it so
# OAuth builds https redirect URIs).
<VirtualHost *:80>
    ServerName mystic.nthmost.net
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8901/
    ProxyPassReverse / http://127.0.0.1:8901/
    RequestHeader set X-Forwarded-Proto "http"
    ErrorLog ${APACHE_LOG_DIR}/mystic_error.log
    CustomLog ${APACHE_LOG_DIR}/mystic_access.log combined
</VirtualHost>
